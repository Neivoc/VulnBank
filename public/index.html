<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VulnBank — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🏦</div>
        <h1>VulnBank</h1>
        <p>Secure Banking Portal</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <p class="text-center mt-2" style="color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? <a href="/register.html">Create Account</a>
      </p>
    </div>
  </div>

  <footer class="footer">
    <p>VulnBank © 2026 — Educational Purposes Only</p>

  </footer>

  <script src="/js/auth.js"></script>
</body>

</html>
