<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnBank — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="/dashboard.html" class="navbar-brand">
            <div class="brand-icon">🏦</div>
            <span>VulnBank</span>
        </a>
        <ul class="navbar-nav">
            <li><a href="/dashboard.html" class="active">📊 Dashboard</a></li>
            <li><a href="/transfer.html">💸 Transfer</a></li>
            <li><a href="/search.html">🔍 Search</a></li>
            <li><a href="/profile">👤 Profile</a></li>
            <li><a href="/admin" id="adminLink" style="display:none;">⚙️ Admin</a></li>
        </ul>
        <div class="navbar-user">
            <div class="user-info">
                <div class="username" id="navUsername">User</div>
                <span class="role-badge user" id="navRole">user</span>
            </div>
            <button class="btn btn-outline" onclick="logout()"
                style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Welcome back, <span id="welcomeName">User</span> 👋</h1>
            <p>Here's an overview of your finances</p>
        </div>

        <div class="stats-grid" id="accountsGrid">
            <!-- Filled by JS -->
        </div>

        <div class="card">
            <div class="card-header">
                <h3>📋 Recent Transactions</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTable">
                        <tr>
                            <td colspan="5" class="text-center text-muted" style="padding:2rem;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>VulnBank © 2026 — All Rights Reserved</p>
    </footer>

    <script src="/js/utils.js"></script>
    <script src="/js/dashboard.js"></script>
</body>

</html>
