<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VulnBank — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🏦</div>
        <h1>VulnBank</h1>
        <p>Create Your Banking Account</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Choose a password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          Create Account
        </button>
      </form>

      <p class="text-center mt-2" style="color: var(--text-secondary); font-size: 0.9rem;">
        Already have an account? <a href="/index.html">Sign In</a>
      </p>
    </div>
  </div>

  <footer class="footer">
    <p>VulnBank © 2026 — Educational Purposes Only</p>

  </footer>

  <script src="/js/auth.js"></script>
</body>

</html>
